stages:
  - build
  - publish
  - deploy

variables:
  DOCKER_TLS_CERTDIR: "/certs"
  FRONTEND_IMAGE: $CI_REGISTRY_IMAGE/frontend:latest
  BACKEND_IMAGE: $CI_REGISTRY_IMAGE/backend:latest

build_frontend:
  stage: build
  image: node:20-alpine
  script:
    - npm ci
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 1 hour

build_backend:
  stage: build
  image: mcr.microsoft.com/dotnet/sdk:8.0
  script:
    - cd ShelterWebApp.Api
    - dotnet restore
    - dotnet build -c Release

publish_images:
  stage: publish
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    # Build and Push Backend
    - docker build -t $BACKEND_IMAGE -f ShelterWebApp.Api/Dockerfile ShelterWebApp.Api
    - docker push $BACKEND_IMAGE
    # Build and Push Frontend
    - docker build -t $FRONTEND_IMAGE -f Dockerfile.frontend .
    - docker push $FRONTEND_IMAGE

deploy_to_server:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan -H $SERVER_IP >> ~/.ssh/known_hosts
  script:
    - ssh $SERVER_USER@$SERVER_IP "
        cd /app &&
        docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY &&
        docker compose pull &&
        docker compose up -d --remove-orphans &&
        docker image prune -f
      "
  only:
    - main
